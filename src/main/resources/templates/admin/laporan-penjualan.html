<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Penjualan - myjersey Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#BD114A',
                        secondary: '#EEEEEE',
                        accent: '#547792',
                        success: '#7FB77E',
                        warning: '#FAE251',
                    },
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Poppins', sans-serif; }
        
        .sidebar-menu-item:hover { background-color: rgba(255, 255, 255, 0.15); }
        .sidebar-menu-item.active { background-color: rgba(255, 255, 255, 0.25); }
        
        .profile-dropdown { transform-origin: bottom; transition: all 0.15s ease-out; }
        .profile-dropdown.hidden { opacity: 0; transform: scaleY(0.95); }
        .profile-dropdown:not(.hidden) { opacity: 1; transform: scaleY(1); }
        
        .table-row:hover { background-color: rgba(189, 17, 74, 0.03); }
        
        #sidebar { transition: transform 300ms ease-in-out; }
        #mainContent { transition: margin-left 300ms ease-in-out; }
        
        .burger-btn { transition: all 0.2s ease; }
        .burger-btn:hover { background-color: rgba(189, 17, 74, 0.1); }
        .burger-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-gray-100 font-poppins">
    
    <!-- Main Container -->
    <div class="flex min-h-screen">
        
        <!-- Sidebar Fragment -->
        <aside th:replace="~{fragments/sidebar :: sidebar(activeMenu='salesReport')}"></aside>
        
        <!-- ========== MAIN CONTENT ========== -->
        <main id="mainContent" class="flex-1 ml-64 transition-all duration-300 ease-in-out">
            
            <!-- Header with Hamburger Menu -->
            <header class="bg-[#EEEEEE] shadow-sm sticky top-0 z-40">
                <div class="flex items-center px-6 py-4">
                    <button id="burgerBtn" type="button" class="burger-btn flex items-center justify-center w-10 h-10 rounded-lg hover:bg-primary/10 focus:outline-none focus:ring-2 focus:ring-primary/30" aria-label="Toggle Sidebar">
                        <div class="flex flex-col items-center justify-center space-y-1.5">
                            <span class="block w-6 h-0.5 bg-[#BD114A] rounded-full"></span>
                            <span class="block w-6 h-0.5 bg-[#BD114A] rounded-full"></span>
                            <span class="block w-6 h-0.5 bg-[#BD114A] rounded-full"></span>
                        </div>
                    </button>
                    <div class="ml-4">
                        <h2 class="text-lg font-semibold text-gray-800">Laporan Penjualan</h2>
                    </div>
                </div>
            </header>
            
            <!-- Content -->
            <div class="p-6">
                
                <!-- Summary Cards -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div class="bg-gradient-to-br from-primary to-pink-700 rounded-xl shadow-sm p-6 text-white">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm text-white/80">Total Pendapatan</p>
                                <p class="text-3xl font-bold mt-1" th:text="${'Rp ' + #numbers.formatInteger(totalRevenue, 0, 'POINT')}">Rp 0</p>
                                <p class="text-xs text-white/60 mt-1">Dari pesanan selesai</p>
                            </div>
                            <div class="w-14 h-14 bg-white/20 rounded-xl flex items-center justify-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm text-gray-500">Total Pesanan Selesai</p>
                                <p class="text-3xl font-bold text-gray-800 mt-1" th:text="${totalOrders}">0</p>
                                <p class="text-xs text-gray-400 mt-1">Order COMPLETED</p>
                            </div>
                            <div class="w-14 h-14 bg-success/10 rounded-xl flex items-center justify-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-success" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Chart Section -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4">Top 5 Jersey Terlaris</h3>
                    <div class="h-80 flex items-center justify-center">
                        <canvas id="salesChart"></canvas>
                    </div>
                </div>
                
                <!-- Table -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="px-6 py-4 border-b border-gray-100">
                        <h3 class="text-lg font-semibold text-gray-800">Detail Pesanan Selesai</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-primary text-white">
                                <tr>
                                    <th class="px-6 py-4 text-sm font-semibold tracking-wide">ID Order</th>
                                    <th class="px-6 py-4 text-sm font-semibold tracking-wide">Nama Pelanggan</th>
                                    <th class="px-6 py-4 text-sm font-semibold tracking-wide">Tanggal</th>
                                    <th class="px-6 py-4 text-sm font-semibold tracking-wide text-right">Total Harga</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                <tr th:if="${completedOrders == null or completedOrders.isEmpty()}">
                                    <td colspan="4" class="px-6 py-12 text-center text-gray-500">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto text-gray-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                                        </svg>
                                        <p class="font-medium">Belum ada pesanan selesai</p>
                                    </td>
                                </tr>
                                <th:block th:each="order : ${completedOrders}">
                                    <tr class="table-row hover:bg-gray-50 transition-colors">
                                        <td class="px-6 py-4">
                                            <span class="font-semibold text-gray-800" th:text="'#ORD-' + ${#numbers.formatInteger(order.id, 3)}">#ORD-001</span>
                                        </td>
                                        <td class="px-6 py-4">
                                            <div class="flex items-center gap-3">
                                                <div class="w-8 h-8 rounded-full bg-accent/10 flex items-center justify-center">
                                                    <span class="text-xs font-semibold text-accent" th:text="${#strings.substring(order.customer.name, 0, 1).toUpperCase()}">A</span>
                                                </div>
                                                <div>
                                                    <p class="text-sm font-medium text-gray-800" th:text="${order.customer.name}">Nama</p>
                                                    <p class="text-xs text-gray-500" th:text="${order.customer.username}">username</p>
                                                </div>
                                            </div>
                                        </td>
                                        <td class="px-6 py-4">
                                            <p class="text-sm text-gray-600" th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy')}">01 Jan 2024</p>
                                            <p class="text-xs text-gray-400" th:text="${#temporals.format(order.orderDate, 'HH:mm')}">10:00</p>
                                        </td>
                                        <td class="px-6 py-4 text-right">
                                            <span class="text-sm font-bold text-success" th:text="${'Rp ' + #numbers.formatInteger(order.finalPrice != null ? order.finalPrice : order.totalPrice, 0, 'POINT')}">Rp 0</span>
                                        </td>
                                    </tr>
                                </th:block>
                            </tbody>
                        </table>
                    </div>
                </div>
                
            </div>
        </main>
    </div>
    
    <script th:inline="javascript">
        /*<![CDATA[*/
        const chartLabels = /*[[${chartLabels}]]*/ [];
        const chartData = /*[[${chartData}]]*/ [];
        /*]]>*/
        
        const ctx = document.getElementById('salesChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: chartLabels.length > 0 ? chartLabels : ['Tidak ada data'],
                datasets: [{
                    label: 'Jumlah Terjual',
                    data: chartData.length > 0 ? chartData : [0],
                    backgroundColor: [
                        'rgba(189, 17, 74, 0.8)',
                        'rgba(84, 119, 146, 0.8)',
                        'rgba(127, 183, 126, 0.8)',
                        'rgba(250, 226, 81, 0.8)',
                        'rgba(255, 99, 132, 0.8)'
                    ],
                    borderColor: [
                        'rgb(189, 17, 74)',
                        'rgb(84, 119, 146)',
                        'rgb(127, 183, 126)',
                        'rgb(250, 226, 81)',
                        'rgb(255, 99, 132)'
                    ],
                    borderWidth: 2,
                    borderRadius: 8,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: {
                        backgroundColor: 'rgba(0, 0, 0, 0.8)',
                        padding: 12,
                        titleFont: {
                            size: 14,
                            weight: 'bold'
                        },
                        bodyFont: {
                            size: 13
                        },
                        callbacks: {
                            label: function(context) {
                                return context.parsed.y + ' unit terjual';
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            stepSize: 1,
                            font: {
                                size: 12
                            }
                        },
                        grid: {
                            color: 'rgba(0, 0, 0, 0.05)'
                        }
                    },
                    x: {
                        ticks: {
                            font: {
                                size: 11
                            },
                            maxRotation: 45,
                            minRotation: 0
                        },
                        grid: {
                            display: false
                        }
                    }
                }
            }
        });
    </script>
    
    <script>
        // SIDEBAR TOGGLE
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const burgerBtn = document.getElementById('burgerBtn');
        let sidebarOpen = true;
        
        burgerBtn.addEventListener('click', function() {
            sidebarOpen = !sidebarOpen;
            if (sidebarOpen) {
                sidebar.style.transform = 'translateX(0)';
                mainContent.style.marginLeft = '256px';
            } else {
                sidebar.style.transform = 'translateX(-100%)';
                mainContent.style.marginLeft = '0';
            }
        });
        
        // PROFILE DROPDOWN
        const profileBtn = document.getElementById('profileBtn');
        const profileDropdown = document.getElementById('profileDropdown');
        const dropdownArrow = document.getElementById('dropdownArrow');
        
        if (profileBtn && profileDropdown) {
            profileBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                profileDropdown.classList.toggle('hidden');
                dropdownArrow.classList.toggle('rotate-180');
            });
            
            document.addEventListener('click', function() {
                if (!profileDropdown.classList.contains('hidden')) {
                    profileDropdown.classList.add('hidden');
                    dropdownArrow.classList.remove('rotate-180');
                }
            });
        }
    </script>
    
</body>
</html>
