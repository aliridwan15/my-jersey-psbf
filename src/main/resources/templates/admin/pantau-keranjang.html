<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantau Keranjang - myjersey Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#BD114A',
                        secondary: '#EEEEEE',
                        accent: '#547792',
                        success: '#7FB77E',
                        warning: '#FAE251',
                    },
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Poppins', sans-serif; }
        
        .sidebar-menu-item:hover { background-color: rgba(255, 255, 255, 0.15); }
        .sidebar-menu-item.active { background-color: rgba(255, 255, 255, 0.25); }
        
        .profile-dropdown { transform-origin: bottom; transition: all 0.15s ease-out; }
        .profile-dropdown.hidden { opacity: 0; transform: scaleY(0.95); }
        .profile-dropdown:not(.hidden) { opacity: 1; transform: scaleY(1); }
        
        .table-row:hover { background-color: rgba(189, 17, 74, 0.03); }
        
        #sidebar { transition: transform 300ms ease-in-out; }
        #mainContent { transition: margin-left 300ms ease-in-out; }
        
        .burger-btn { transition: all 0.2s ease; }
        .burger-btn:hover { background-color: rgba(189, 17, 74, 0.1); }
        .burger-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-gray-100 font-poppins">
    
    <!-- Main Container -->
    <div class="flex min-h-screen">
        
        <!-- Sidebar Fragment -->
        <aside th:replace="~{fragments/sidebar :: sidebar(activeMenu='carts')}"></aside>
        
        <!-- ========== MAIN CONTENT ========== -->
        <main id="mainContent" class="flex-1 ml-64 transition-all duration-300 ease-in-out">
            
            <!-- Header with Hamburger Menu -->
            <header class="bg-[#EEEEEE] shadow-sm sticky top-0 z-40">
                <div class="flex items-center px-6 py-4">
                    <button id="burgerBtn" type="button" class="burger-btn flex items-center justify-center w-10 h-10 rounded-lg hover:bg-primary/10 focus:outline-none focus:ring-2 focus:ring-primary/30" aria-label="Toggle Sidebar">
                        <div class="flex flex-col items-center justify-center space-y-1.5">
                            <span class="block w-6 h-0.5 bg-[#BD114A] rounded-full"></span>
                            <span class="block w-6 h-0.5 bg-[#BD114A] rounded-full"></span>
                            <span class="block w-6 h-0.5 bg-[#BD114A] rounded-full"></span>
                        </div>
                    </button>
                    <div class="ml-4">
                        <h2 class="text-lg font-semibold text-gray-800">Pantau Keranjang</h2>
                    </div>
                </div>
            </header>
            
            <!-- Content -->
            <div class="p-6">
                
                <!-- Alert Messages -->
                <div th:if="${successMessage}" class="mb-4 p-4 bg-success/10 text-success rounded-lg text-sm font-medium flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span th:text="${successMessage}"></span>
                </div>
                
                <div th:if="${errorMessage}" class="mb-4 p-4 bg-red-50 text-red-600 rounded-lg text-sm font-medium flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span th:text="${errorMessage}"></span>
                </div>
                
                <!-- Summary Cards -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm text-gray-500">Total Keranjang</p>
                                <p class="text-2xl font-bold text-gray-800" th:text="${totalItems}">0</p>
                            </div>
                            <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                                </svg>
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm text-gray-500">Total Item</p>
                                <p class="text-2xl font-bold text-gray-800" th:text="${carts.size()}">0</p>
                            </div>
                            <div class="w-12 h-12 bg-accent/10 rounded-xl flex items-center justify-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Table -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-primary text-white">
                                <tr>
                                    <th class="px-6 py-4 text-sm font-semibold tracking-wide">ID</th>
                                    <th class="px-6 py-4 text-sm font-semibold tracking-wide">Pelanggan</th>
                                    <th class="px-6 py-4 text-sm font-semibold tracking-wide">Jersey</th>
                                    <th class="px-6 py-4 text-sm font-semibold tracking-wide text-center">Ukuran</th>
                                    <th class="px-6 py-4 text-sm font-semibold tracking-wide text-center">Jumlah</th>
                                    <th class="px-6 py-4 text-sm font-semibold tracking-wide">Tanggal Masuk</th>
                                    <th class="px-6 py-4 text-sm font-semibold tracking-wide text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                <tr th:if="${carts == null or carts.isEmpty()}">
                                    <td colspan="7" class="px-6 py-12 text-center text-gray-500">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto text-gray-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                                        </svg>
                                        <p class="font-medium">Belum ada keranjang belanja</p>
                                    </td>
                                </tr>
                                <th:block th:each="cart : ${carts}">
                                    <tr class="table-row hover:bg-gray-50 transition-colors">
                                        <td class="px-6 py-4">
                                            <span class="font-semibold text-gray-800" th:text="'#CRT-' + ${#numbers.formatInteger(cart.id, 3)}">#CRT-001</span>
                                        </td>
                                        <td class="px-6 py-4">
                                            <div class="flex items-center gap-3">
                                                <div class="w-8 h-8 rounded-full bg-accent/10 flex items-center justify-center">
                                                    <span class="text-xs font-semibold text-accent" th:text="${#strings.substring(cart.user.name, 0, 1).toUpperCase()}">A</span>
                                                </div>
                                                <div>
                                                    <p class="text-sm font-medium text-gray-800" th:text="${cart.user.name}">Nama</p>
                                                    <p class="text-xs text-gray-500" th:text="${cart.user.username}">username</p>
                                                </div>
                                            </div>
                                        </td>
                                        <td class="px-6 py-4">
                                            <p class="text-sm font-medium text-gray-800" th:text="${cart.jersey.name}">Jersey Name</p>
                                            <p class="text-xs text-gray-500" th:text="${cart.jersey.team != null ? cart.jersey.team.name : '-'}">Team</p>
                                        </td>
                                        <td class="px-6 py-4 text-center">
                                            <span class="inline-flex items-center justify-center w-8 h-8 bg-accent/10 text-accent text-sm font-bold rounded" th:text="${cart.size}">L</span>
                                        </td>
                                        <td class="px-6 py-4 text-center">
                                            <span class="text-sm font-bold text-gray-800" th:text="${cart.quantity}">1</span>
                                        </td>
                                        <td class="px-6 py-4">
                                            <p class="text-sm text-gray-600" th:text="${#temporals.format(cart.createdAt, 'dd MMM yyyy')}">01 Jan 2024</p>
                                            <p class="text-xs text-gray-400" th:text="${#temporals.format(cart.createdAt, 'HH:mm')}">10:00</p>
                                        </td>
                                        <td class="px-6 py-4 text-center">
                                            <form th:action="@{/admin/carts/delete/{id}(id=${cart.id})}" method="GET" class="inline">
                                                <button type="submit" onclick="return confirm('Yakin ingin menghapus keranjang ini?')" class="inline-flex items-center justify-center w-9 h-9 bg-red-50 text-red-600 rounded-lg hover:bg-red-600 hover:text-white transition-colors border border-red-100" title="Hapus">
                                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                                    </svg>
                                                </button>
                                            </form>
                                        </td>
                                    </tr>
                                </th:block>
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- Pagination -->
                    <div th:if="${showPagination}" class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex items-center justify-between">
                        <div class="text-sm text-gray-500">
                            Menampilkan <span th:text="${currentPage * 10 + 1}">1</span> - 
                            <span th:text="${(currentPage + 1) * 10 > totalItems ? totalItems : (currentPage + 1) * 10}">10</span> 
                            dari <span th:text="${totalItems}">100</span> data
                        </div>
                        <div class="flex items-center gap-1">
                            <a th:if="${hasPrevious}" 
                               th:href="@{/admin/carts(page=${currentPage - 1})}"
                               class="px-3 py-2 text-sm font-medium text-gray-600 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                                </svg>
                            </a>
                            <span th:unless="${hasPrevious}" class="px-3 py-2 text-sm font-medium text-gray-400 bg-gray-100 border border-gray-200 rounded-lg cursor-not-allowed">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                                </svg>
                            </span>
                            
                            <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                                <a th:if="${i >= currentPage - 1 and i <= currentPage + 1}"
                                   th:href="@{/admin/carts(page=${i})}"
                                   th:classappend="${i == currentPage} ? 'bg-primary text-white border-primary' : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'"
                                   class="px-3 py-2 text-sm font-medium border rounded-lg transition-colors">
                                    <span th:text="${i + 1}">1</span>
                                </a>
                            </th:block>
                            
                            <a th:if="${hasNext}" 
                               th:href="@{/admin/carts(page=${currentPage + 1})}"
                               class="px-3 py-2 text-sm font-medium text-gray-600 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                                </svg>
                            </a>
                            <span th:unless="${hasNext}" class="px-3 py-2 text-sm font-medium text-gray-400 bg-gray-100 border border-gray-200 rounded-lg cursor-not-allowed">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                                </svg>
                            </span>
                        </div>
                    </div>
                </div>
                
            </div>
        </main>
    </div>
    
    <script>
        // SIDEBAR TOGGLE
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const burgerBtn = document.getElementById('burgerBtn');
        let sidebarOpen = true;
        
        burgerBtn.addEventListener('click', function() {
            sidebarOpen = !sidebarOpen;
            if (sidebarOpen) {
                sidebar.style.transform = 'translateX(0)';
                mainContent.style.marginLeft = '256px';
            } else {
                sidebar.style.transform = 'translateX(-100%)';
                mainContent.style.marginLeft = '0';
            }
        });
        
        // PROFILE DROPDOWN
        const profileBtn = document.getElementById('profileBtn');
        const profileDropdown = document.getElementById('profileDropdown');
        const dropdownArrow = document.getElementById('dropdownArrow');
        
        if (profileBtn && profileDropdown) {
            profileBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                profileDropdown.classList.toggle('hidden');
                dropdownArrow.classList.toggle('rotate-180');
            });
            
            document.addEventListener('click', function() {
                if (!profileDropdown.classList.contains('hidden')) {
                    profileDropdown.classList.add('hidden');
                    dropdownArrow.classList.remove('rotate-180');
                }
            });
        }
    </script>
    
</body>
</html>
