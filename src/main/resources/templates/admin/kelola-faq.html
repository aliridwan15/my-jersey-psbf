<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola FAQ - myjersey Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#BD114A',
                        secondary: '#EEEEEE',
                        accent: '#547792',
                        success: '#7FB77E',
                        warning: '#FAE251',
                    },
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Poppins', sans-serif; }
        
        .sidebar-menu-item:hover { background-color: rgba(255, 255, 255, 0.15); }
        .sidebar-menu-item.active { background-color: rgba(255, 255, 255, 0.25); }
        
        .profile-dropdown { transform-origin: bottom; transition: all 0.15s ease-out; }
        .profile-dropdown.hidden { opacity: 0; transform: scaleY(0.95); }
        .profile-dropdown:not(.hidden) { opacity: 1; transform: scaleY(1); }
        
        .table-row:hover { background-color: rgba(189, 17, 74, 0.03); }
        
        .modal-overlay { transition: opacity 0.2s ease-out; }
        .modal-overlay.hidden { opacity: 0; pointer-events: none; }
        .modal-overlay:not(.hidden) { opacity: 1; }
        
        .modal-content { transition: all 0.2s ease-out; }
        .modal-overlay.hidden .modal-content { transform: scale(0.95); opacity: 0; }
        .modal-overlay:not(.hidden) .modal-content { transform: scale(1); opacity: 1; }
        
        #sidebar { transition: transform 300ms ease-in-out; }
        #mainContent { transition: margin-left 300ms ease-in-out; }
        
        .burger-btn { transition: all 0.2s ease; }
        .burger-btn:hover { background-color: rgba(189, 17, 74, 0.1); }
        .burger-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-gray-100 font-poppins">
    
    <!-- Main Container -->
    <div class="flex min-h-screen">
        
        <!-- Sidebar Fragment -->
        <aside th:replace="~{fragments/sidebar :: sidebar(activeMenu='faq')}"></aside>
        
        <!-- ========== MAIN CONTENT ========== -->
        <main id="mainContent" class="flex-1 ml-64 transition-all duration-300 ease-in-out">
            
            <!-- Header with Hamburger Menu -->
            <header class="bg-[#EEEEEE] shadow-sm sticky top-0 z-40">
                <div class="flex items-center px-6 py-4">
                    <button id="burgerBtn" type="button" class="burger-btn flex items-center justify-center w-10 h-10 rounded-lg hover:bg-primary/10 focus:outline-none focus:ring-2 focus:ring-primary/30" aria-label="Toggle Sidebar">
                        <div class="flex flex-col items-center justify-center space-y-1.5">
                            <span class="block w-6 h-0.5 bg-[#BD114A] rounded-full"></span>
                            <span class="block w-6 h-0.5 bg-[#BD114A] rounded-full"></span>
                            <span class="block w-6 h-0.5 bg-[#BD114A] rounded-full"></span>
                        </div>
                    </button>
                    <div class="ml-4">
                        <h2 class="text-lg font-semibold text-gray-800">Kelola FAQ</h2>
                    </div>
                </div>
            </header>
            
            <!-- Content -->
            <div class="p-6">
                
                <!-- Alert Messages -->
                <div th:if="${successMessage}" class="mb-4 p-4 bg-success/10 text-success rounded-lg text-sm font-medium flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span th:text="${successMessage}"></span>
                </div>
                
                <!-- Actions -->
                <div class="mb-4 flex justify-end">
                    <button onclick="openAddModal()" class="flex items-center gap-2 bg-primary hover:bg-pink-800 text-white px-5 py-2.5 rounded-lg text-sm font-semibold transition-colors shadow-md">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                        </svg>
                        Tambah FAQ
                    </button>
                </div>
                
                <!-- Table -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-primary text-white">
                                <tr>
                                    <th class="px-6 py-4 text-sm font-semibold tracking-wide text-center">No</th>
                                    <th class="px-6 py-4 text-sm font-semibold tracking-wide">Pertanyaan</th>
                                    <th class="px-6 py-4 text-sm font-semibold tracking-wide">Kategori</th>
                                    <th class="px-6 py-4 text-sm font-semibold tracking-wide text-center">Urutan</th>
                                    <th class="px-6 py-4 text-sm font-semibold tracking-wide text-center">Status</th>
                                    <th class="px-6 py-4 text-sm font-semibold tracking-wide text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                <tr th:if="${faqs == null or faqs.isEmpty()}">
                                    <td colspan="6" class="px-6 py-12 text-center text-gray-500">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto text-gray-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                        </svg>
                                        <p class="font-medium">Belum ada FAQ yang ditambahkan.</p>
                                        <p class="text-sm mt-1">Tambahkan FAQ baru untuk membantu pelanggan</p>
                                    </td>
                                </tr>
                                <tr th:each="faq, iterStat : ${faqs}" class="table-row hover:bg-gray-50 transition-colors">
                                    <td class="px-6 py-4 text-center">
                                        <span class="inline-flex items-center justify-center w-8 h-8 bg-primary/10 text-primary font-bold text-sm rounded-full" th:text="${iterStat.count}">1</span>
                                    </td>
                                    <td class="px-6 py-4">
                                        <div class="max-w-md">
                                            <p class="font-medium text-gray-800 text-sm leading-relaxed" th:text="${faq.question}">Pertanyaan FAQ</p>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4">
                                        <span class="inline-flex items-center px-3 py-1.5 bg-accent/10 text-accent text-xs font-semibold rounded-lg" th:text="${faq.category != null ? faq.category : '-'}">Kategori</span>
                                    </td>
                                    <td class="px-6 py-4 text-center">
                                        <span class="inline-flex items-center justify-center w-8 h-8 bg-gray-100 text-gray-700 font-bold text-sm rounded-lg" th:text="${faq.sortOrder != null ? faq.sortOrder : 0}">1</span>
                                    </td>
                                    <td class="px-6 py-4 text-center">
                                        <span th:if="${faq.isActive}" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-success/10 text-success text-xs font-bold rounded-full">
                                            <span class="w-2 h-2 bg-success rounded-full animate-pulse"></span>
                                            Aktif
                                        </span>
                                        <span th:unless="${faq.isActive}" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-gray-100 text-gray-500 text-xs font-bold rounded-full">
                                            Tidak Aktif
                                        </span>
                                    </td>
                                    <td class="px-6 py-4">
                                        <div class="flex items-center justify-center gap-2">
                                            <button type="button" 
                                                    th:attr="data-id=${faq.id}, data-question=${faq.question}, data-answer=${faq.answer}, data-category=${faq.category}, data-sortOrder=${faq.sortOrder}, data-isActive=${faq.isActive}" 
                                                    onclick="editFAQ(this)"
                                                    class="flex items-center justify-center w-8 h-8 bg-yellow-50 text-yellow-600 rounded-lg hover:bg-yellow-400 hover:text-white transition-colors border border-yellow-200">
                                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                                                </svg>
                                            </button>
                                            <button type="button" 
                                                    th:attr="data-id=${faq.id}, data-question=${faq.question}"
                                                    onclick="confirmDelete(this)"
                                                    class="flex items-center justify-center w-8 h-8 bg-red-50 text-red-600 rounded-lg hover:bg-red-600 hover:text-white transition-colors border border-red-100">
                                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                                </svg>
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Pagination -->
                <div class="px-6 py-4 border-t border-gray-100 flex items-center justify-between bg-gray-50 rounded-b-xl" th:if="${totalPages > 1}">
                    <div class="text-sm text-gray-600">
                        <span>Menampilkan </span>
                        <span th:text="${currentPage * 10 + 1}">1</span>
                        <span> - </span>
                        <span th:text="${currentPage * 10 + faqs.size()}">10</span>
                        <span> dari </span>
                        <span th:text="${totalItems}">15</span>
                        <span> data</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <th:block th:if="${currentPage > 0}">
                            <a th:href="@{/admin/faqs(page=${currentPage - 1})}" class="w-9 h-9 flex items-center justify-center rounded-lg border border-gray-200 text-gray-600 hover:bg-primary hover:text-white hover:border-primary transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                            </a>
                        </th:block>
                        <th:block th:unless="${currentPage > 0}">
                            <span class="w-9 h-9 flex items-center justify-center rounded-lg border border-gray-200 text-gray-300 pointer-events-none">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                            </span>
                        </th:block>
                        <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                            <a th:href="@{/admin/faqs(page=${i})}"
                               class="w-9 h-9 flex items-center justify-center rounded-lg border text-sm font-medium transition-colors"
                               th:classappend="${i == currentPage} ? 'bg-primary text-white border-primary' : 'border-gray-200 text-gray-600 hover:bg-gray-100'">
                                <span th:text="${i + 1}">1</span>
                            </a>
                        </th:block>
                        <th:block th:if="${currentPage < totalPages - 1}">
                            <a th:href="@{/admin/faqs(page=${currentPage + 1})}" class="w-9 h-9 flex items-center justify-center rounded-lg border border-gray-200 text-gray-600 hover:bg-primary hover:text-white hover:border-primary transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
                            </a>
                        </th:block>
                        <th:block th:unless="${currentPage < totalPages - 1}">
                            <span class="w-9 h-9 flex items-center justify-center rounded-lg border border-gray-200 text-gray-300 pointer-events-none">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
                            </span>
                        </th:block>
                    </div>
                </div>
        </main>
    </div>
    
    <!-- ========== ADD/EDIT MODAL ========== -->
    <div id="faqModal" class="modal-overlay hidden fixed inset-0 z-[999] bg-black/60 backdrop-blur-sm flex items-center justify-center">
        <div class="modal-content bg-white rounded-2xl shadow-2xl max-w-lg w-full mx-4 overflow-hidden border-t-4 border-primary">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 id="modalTitle" class="text-lg font-bold text-gray-800 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                    Tambah FAQ
                </h3>
                <button type="button" onclick="closeModal()" class="text-gray-400 hover:text-red-500 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <form th:action="@{/admin/faqs/save}" method="POST" class="p-6 space-y-5">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="id" id="faqId">
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Pertanyaan</label>
                    <input type="text" name="question" id="faqQuestion" required 
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:outline-none bg-gray-50 focus:bg-white transition-colors" 
                           placeholder="Masukkan pertanyaan FAQ">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Jawaban</label>
                    <textarea name="answer" id="faqAnswer" required rows="4"
                              class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:outline-none bg-gray-50 focus:bg-white transition-colors resize-none" 
                              placeholder="Masukkan jawaban untuk pertanyaan tersebut"></textarea>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Kategori</label>
                        <select name="category" id="faqCategory" 
                                class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:outline-none bg-gray-50 focus:bg-white transition-colors">
                            <option value="">-- Pilih Kategori --</option>
                            <option value="Produk">Produk</option>
                            <option value="Pengiriman">Pengiriman</option>
                            <option value="Pembayaran">Pembayaran</option>
                            <option value="Layanan">Layanan</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Sort Order</label>
                        <input type="number" name="sortOrder" id="faqSortOrder" min="0" 
                               class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:outline-none bg-gray-50 focus:bg-white transition-colors" 
                               placeholder="0" value="0">
                    </div>
                </div>
                
                <div class="flex items-center gap-3">
                    <input type="checkbox" name="isActive" id="faqIsActive" value="true" checked 
                           class="w-5 h-5 text-primary border-gray-300 rounded focus:ring-primary">
                    <label for="faqIsActive" class="text-sm text-gray-700">FAQ Aktif</label>
                </div>
                
                <div class="pt-4 flex justify-end gap-3">
                    <button type="button" onclick="closeModal()" class="px-5 py-2.5 text-gray-600 bg-gray-100 rounded-xl hover:bg-gray-200 font-bold transition-colors">Batal</button>
                    <button type="submit" class="px-5 py-2.5 text-white bg-primary rounded-xl hover:bg-pink-800 font-bold shadow-md hover:shadow-lg transition-all">Simpan FAQ</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- ========== DELETE CONFIRMATION MODAL ========== -->
    <div id="deleteModal" class="modal-overlay hidden fixed inset-0 z-[999] bg-black/60 backdrop-blur-sm flex items-center justify-center">
        <div class="modal-content bg-white rounded-2xl shadow-2xl max-w-sm w-full mx-4 overflow-hidden border-t-4 border-red-500">
            <div class="p-6 text-center">
                <div class="w-16 h-16 mx-auto mb-4 bg-red-100 rounded-full flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
                <h3 class="text-lg font-bold text-gray-800 mb-2">Hapus FAQ?</h3>
                <p class="text-sm text-gray-600 mb-1">Anda yakin ingin menghapus FAQ ini?</p>
                <p class="text-sm font-semibold text-gray-800 mb-4" id="deleteQuestionText"></p>
                <div class="flex justify-center gap-3">
                    <button type="button" onclick="closeDeleteModal()" class="px-5 py-2.5 text-gray-600 bg-gray-100 rounded-xl hover:bg-gray-200 font-bold transition-colors">Batal</button>
                    <a id="confirmDeleteBtn" href="#" class="px-5 py-2.5 text-white bg-red-500 rounded-xl hover:bg-red-600 font-bold shadow-md hover:shadow-lg transition-all">Hapus</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // SIDEBAR TOGGLE
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const burgerBtn = document.getElementById('burgerBtn');
        let sidebarOpen = true;
        
        burgerBtn.addEventListener('click', function() {
            sidebarOpen = !sidebarOpen;
            if (sidebarOpen) {
                sidebar.style.transform = 'translateX(0)';
                mainContent.style.marginLeft = '256px';
            } else {
                sidebar.style.transform = 'translateX(-100%)';
                mainContent.style.marginLeft = '0';
            }
        });
        
        // MODAL FUNCTIONS
        function openModal() {
            document.getElementById('faqModal').classList.remove('hidden');
        }
        
        function closeModal() {
            document.getElementById('faqModal').classList.add('hidden');
            document.getElementById('faqId').value = '';
            document.getElementById('faqQuestion').value = '';
            document.getElementById('faqAnswer').value = '';
            document.getElementById('faqCategory').value = '';
            document.getElementById('faqSortOrder').value = '0';
            document.getElementById('faqIsActive').checked = true;
            document.getElementById('modalTitle').innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
                Tambah FAQ
            `;
        }
        
        function openAddModal() {
            closeModal();
            openModal();
        }
        
        // EDIT FAQ
        function editFAQ(button) {
            const id = button.getAttribute('data-id');
            const question = button.getAttribute('data-question');
            const answer = button.getAttribute('data-answer');
            const category = button.getAttribute('data-category');
            const sortOrder = button.getAttribute('data-sortOrder');
            const isActive = button.getAttribute('data-isActive') === 'true';
            
            document.getElementById('faqId').value = id;
            document.getElementById('faqQuestion').value = question;
            document.getElementById('faqAnswer').value = answer;
            document.getElementById('faqCategory').value = category || '';
            document.getElementById('faqSortOrder').value = sortOrder || '0';
            document.getElementById('faqIsActive').checked = isActive;
            
            document.getElementById('modalTitle').innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-warning" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                </svg>
                Edit FAQ
            `;
            
            openModal();
        }
        
        // DELETE CONFIRMATION
        function confirmDelete(button) {
            const id = button.getAttribute('data-id');
            const question = button.getAttribute('data-question');
            
            document.getElementById('deleteQuestionText').textContent = '"' + question + '"';
            document.getElementById('confirmDeleteBtn').href = '/admin/faqs/delete/' + id;
            document.getElementById('deleteModal').classList.remove('hidden');
        }
        
        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.add('hidden');
        }
        
        // CLOSE MODALS ON ESCAPE KEY
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
                closeDeleteModal();
            }
        });
        
        // CLOSE MODALS ON OUTSIDE CLICK
        document.getElementById('faqModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
        
        document.getElementById('deleteModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeDeleteModal();
            }
        });
        
        // PROFILE DROPDOWN
        const profileBtn = document.getElementById('profileBtn');
        const profileDropdown = document.getElementById('profileDropdown');
        const dropdownArrow = document.getElementById('dropdownArrow');
        
        if (profileBtn && profileDropdown) {
            profileBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                profileDropdown.classList.toggle('hidden');
                dropdownArrow.classList.toggle('rotate-180');
            });
            
            document.addEventListener('click', function() {
                if (!profileDropdown.classList.contains('hidden')) {
                    profileDropdown.classList.add('hidden');
                    dropdownArrow.classList.remove('rotate-180');
                }
            });
        }
    </script>
    
</body>
</html>
