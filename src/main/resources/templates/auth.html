<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk / Daftar - myjersey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#BD114A',
                        secondary: '#1A1A2E',
                    },
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Poppins', sans-serif; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.4s ease forwards;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-poppins antialiased min-h-screen flex flex-col">

    <!-- Header Navigation -->
    <nav th:replace="~{fragments/header :: header}"></nav>

    <!-- Main Content -->
    <div class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        
        <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-gray-100 p-8 sm:p-10 relative overflow-hidden">
            
            <!-- Header section of the card -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-secondary mb-2">my<span class="text-primary">jersey</span></h1>
                <p class="text-gray-500 text-sm">Masuk atau daftar untuk melanjutkan</p>
            </div>

            <!-- Tabs -->
            <div class="flex space-x-1 bg-gray-100 p-1 rounded-xl mb-8 w-full">
                <button id="tabLogin" onclick="showLogin()" class="flex-1 py-2.5 text-sm font-semibold rounded-lg bg-white text-secondary shadow-sm transition-all duration-300">Masuk</button>
                <button id="tabRegister" onclick="showRegister()" class="flex-1 py-2.5 text-sm font-semibold rounded-lg text-gray-500 hover:text-secondary transition-all duration-300">Daftar</button>
            </div>

            <!-- Login Form -->
            <div id="formLogin" class="animate-fadeIn w-full">
                <div th:if="${error}" class="bg-red-50 text-red-600 border border-red-200 px-4 py-3 rounded-xl mb-6 text-sm text-center font-medium">
                    <span th:text="${error}"></span>
                </div>

                <form th:action="@{/auth/login}" th:method="post" class="space-y-5">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Username</label>
                        <input type="text" name="username" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="Masukkan username">
                    </div>
                    
                    <div>
                        <div class="flex justify-between items-center mb-1.5">
                            <label class="block text-sm font-medium text-gray-700">Password</label>
                            <a href="#" class="text-xs font-semibold text-primary hover:text-pink-800 transition-colors">Lupa Password?</a>
                        </div>
                        <div class="relative">
                            <input type="password" id="loginPassword" name="password" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="••••••••">
                            <button type="button" onclick="togglePassword('loginPassword', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                <svg class="w-5 h-5 eye-open" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                                <svg class="w-5 h-5 eye-closed hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center">
                        <input type="checkbox" id="remember" class="w-4 h-4 text-primary bg-gray-100 border-gray-300 rounded focus:ring-primary focus:ring-2">
                        <label for="remember" class="ml-2 text-sm font-medium text-gray-700">Ingat Saya</label>
                    </div>
                    
                    <button type="submit" class="w-full bg-secondary text-white font-semibold py-3.5 rounded-xl hover:bg-gray-800 transition-colors mt-2 shadow-lg shadow-secondary/20">Masuk</button>
                </form>
            </div>

            <!-- Register Form -->
            <div id="formRegister" class="animate-fadeIn w-full hidden">
                <div th:if="${registerError}" class="bg-red-50 text-red-600 border border-red-200 px-4 py-3 rounded-xl mb-6 text-sm text-center font-medium">
                    <span th:text="${registerError}"></span>
                </div>
                <div th:if="${registerSuccess}" class="bg-green-50 text-green-600 border border-green-200 px-4 py-3 rounded-xl mb-6 text-sm text-center font-medium">
                    <span th:text="${registerSuccess}"></span>
                </div>

                <form th:action="@{/register}" th:method="post" class="space-y-4">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Nama Lengkap</label>
                        <input type="text" name="name" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="Nama lengkap Anda">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Username</label>
                        <input type="text" name="username" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="Pilih username unik">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Alamat</label>
                        <input type="text" name="address" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="Alamat lengkap (opsional)">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Jenis Kelamin</label>
                        <select name="gender" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
                            <option value="">Pilih (Opsional)</option>
                            <option value="Laki-Laki">Laki-Laki</option>
                            <option value="Perempuan">Perempuan</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-1 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                            <input type="password" id="regPassword" name="password" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="••••••••">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Ulangi Password</label>
                            <input type="password" id="regConfirmPassword" required oninput="validatePasswordMatch()" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="••••••••">
                        </div>
                    </div>
                    <p id="passwordMatchError" class="text-xs text-red-500 hidden mt-1">Password tidak cocok!</p>
                    
                    <button type="submit" id="registerSubmitBtn" class="w-full bg-primary text-white font-semibold py-3.5 rounded-xl hover:bg-pink-800 transition-colors mt-4 shadow-lg shadow-primary/30 disabled:opacity-50 disabled:cursor-not-allowed">Daftar Sekarang</button>
                </form>
            </div>
            
        </div>
    </div>

    <!-- Footer -->
    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <script th:inline="javascript">
        function showLogin() {
            document.getElementById('formLogin').classList.remove('hidden');
            document.getElementById('formRegister').classList.add('hidden');
            
            document.getElementById('tabLogin').classList.add('bg-white', 'text-secondary', 'shadow-sm');
            document.getElementById('tabLogin').classList.remove('text-gray-500', 'hover:text-secondary');
            
            document.getElementById('tabRegister').classList.remove('bg-white', 'text-secondary', 'shadow-sm');
            document.getElementById('tabRegister').classList.add('text-gray-500', 'hover:text-secondary');
        }
        
        function showRegister() {
            document.getElementById('formRegister').classList.remove('hidden');
            document.getElementById('formLogin').classList.add('hidden');
            
            document.getElementById('tabRegister').classList.add('bg-white', 'text-secondary', 'shadow-sm');
            document.getElementById('tabRegister').classList.remove('text-gray-500', 'hover:text-secondary');
            
            document.getElementById('tabLogin').classList.remove('bg-white', 'text-secondary', 'shadow-sm');
            document.getElementById('tabLogin').classList.add('text-gray-500', 'hover:text-secondary');
        }
        
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const eyeOpen = button.querySelector('.eye-open');
            const eyeClosed = button.querySelector('.eye-closed');
            
            if (input.type === 'password') {
                input.type = 'text';
                eyeOpen.classList.add('hidden');
                eyeClosed.classList.remove('hidden');
            } else {
                input.type = 'password';
                eyeOpen.classList.remove('hidden');
                eyeClosed.classList.add('hidden');
            }
        }
        
        function validatePasswordMatch() {
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const errorMsg = document.getElementById('passwordMatchError');
            const submitBtn = document.getElementById('registerSubmitBtn');
            
            if (confirmPassword.length > 0 && password !== confirmPassword) {
                errorMsg.classList.remove('hidden');
                submitBtn.disabled = true;
            } else {
                errorMsg.classList.add('hidden');
                submitBtn.disabled = false;
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            /*<![CDATA[*/
            const hasRegError = /*[[${registerError != null}]]*/ false;
            const hasRegSuccess = /*[[${registerSuccess != null}]]*/ false;
            const hasShowReg = /*[[${showRegister == true}]]*/ false;
            
            if (hasRegError || hasRegSuccess || hasShowReg) {
                showRegister();
            }
            /*]]>*/
        });
    </script>
</body>
</html>
