<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myjersey - Login & Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }
        
        .glassmorphism {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .input-glow:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.5);
        }
        
        .filled-input.has-value {
            background-color: white !important;
            color: #1f2937 !important;
            border-color: white !important;
        }
        
        .filled-input.has-value::placeholder {
            color: #9ca3af !important;
        }
        
        .gradient-btn {
            background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%);
            transition: all 0.3s ease;
        }
        
        .gradient-btn:hover {
            background: linear-gradient(135deg, #2563EB 0%, #1E40AF 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(59, 130, 246, 0.4);
        }
        
        .toggle-text {
            transition: all 0.3s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-fadeIn {
            animation: fadeIn 0.5s ease forwards;
        }
        
        .form-container {
            animation: fadeIn 0.5s ease forwards;
        }
    </style>
</head>
<body class="min-h-screen relative overflow-hidden">
    
    <!-- Background Red Gradient -->
    <div class="absolute inset-0 z-0 bg-gradient-to-br from-[#BD114A] via-[#8B0A3D] to-[#5C0826]"></div>
    
    <!-- Main Container -->
    <div class="relative z-10 min-h-screen flex items-center justify-center p-4">
        
        <!-- Form Card -->
        <div class="form-container w-full max-w-sm">
            <div class="glassmorphism rounded-2xl p-6 shadow-2xl">
                
                <!-- Logo & Brand -->
                <div class="text-center mb-4">
                    <h1 class="text-3xl font-bold text-white tracking-tight">
                        <span class="text-blue-500">my</span><span class="text-white">jersey</span>
                    </h1>
                    <p class="text-gray-300 text-xs mt-1">Toko Jersey Bola Terpercaya</p>
                </div>
                
                <!-- Toggle Tabs -->
                <div class="flex bg-white/10 rounded-lg p-1 mb-4">
                    <button 
                        id="tabLogin" 
                        class="flex-1 py-2 rounded-md text-xs font-medium transition-all duration-300 bg-white text-gray-900"
                        onclick="showLogin()"
                    >
                        Masuk
                    </button>
                    <button 
                        id="tabRegister" 
                        class="flex-1 py-2 rounded-md text-xs font-medium transition-all duration-300 text-white/70 hover:text-white"
                        onclick="showRegister()"
                    >
                        Daftar
                    </button>
                </div>
                
                <!-- ========== LOGIN FORM ========== -->
                <div id="formLogin" class="space-y-3">
                    <div th:if="${error}" class="bg-[#BD114A]/10 border border-[#BD114A] text-[#BD114A] px-4 py-3 rounded-lg mb-4 text-sm text-center font-medium shadow-sm transition-all">
                        <span th:text="${error}"></span>
                    </div>
                    <form th:action="@{/auth/login}" th:method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <!-- Username -->
                        <div class="space-y-1">
                            <label class="block text-xs font-medium text-gray-300">Username</label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                                    </svg>
                                </span>
                                <input 
                                    type="text" 
                                    id="loginUsername"
                                    name="username"
                                    class="w-full pl-10 pr-4 py-2.5 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 text-sm outline-none input-glow transition-all duration-300"
                                    placeholder="Username"
                                    required
                                >
                            </div>
                        </div>
                        
                        <!-- Password -->
                        <div class="space-y-1 mt-3">
                            <label class="block text-xs font-medium text-gray-300">Password</label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                                    </svg>
                                </span>
                                <input 
                                    type="password" 
                                    id="loginPassword"
                                    name="password"
                                    class="w-full pl-10 pr-10 py-2.5 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 text-sm outline-none input-glow transition-all duration-300"
                                    placeholder="Password"
                                    required
                                >
                                <button 
                                    type="button" 
                                    onclick="togglePassword('loginPassword', this)"
                                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white transition-colors"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 eye-open" viewBox="0 0 20 20" fill="currentColor">
                                        <path d="M10 12a2 2 0 100-4 2 2 0 000 4z" />
                                        <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd" />
                                    </svg>
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 eye-closed hidden" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.45l1.514 1.514a4 4 0 00-5.478-5.478z" clip-rule="evenodd" />
                                        <path d="M12.454 16.697L9.75 13.992a4 4 0 01-3.742-3.741L2.335 6.578A9.98 9.98 0 00.458 10c1.274 4.057 5.065 7 9.542 7 .847 0 1.669-.105 2.454-.303z" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                        
                        <!-- Remember Me -->
                        <div class="flex items-center justify-between mt-3">
                            <label class="flex items-center">
                                <input type="checkbox" class="w-3.5 h-3.5 rounded border-gray-300 bg-white/10 text-blue-500 focus:ring-blue-500 focus:ring-offset-0">
                                <span class="ml-1.5 text-xs text-gray-300">Ingat saya</span>
                            </label>
                            <a href="#" class="text-xs text-blue-400 hover:text-blue-300 transition-colors">Lupa password?</a>
                        </div>
                        
                        <!-- Submit Button -->
                        <button 
                            type="submit" 
                            class="w-full gradient-btn text-white font-medium py-2.5 rounded-lg mt-4 flex items-center justify-center gap-2 text-sm"
                        >
                            <span>Masuk</span>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M3 3a1 1 0 011 1v12a1 1 0 11-2 0V4a1 1 0 011-1zm7.707 3.293a1 1 0 010 1.414L9.414 9H17a1 1 0 110 2H9.414l1.293 1.293a1 1 0 01-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </form>

                </div>
                
                <!-- ========== REGISTER FORM ========== -->
                <div id="formRegister" class="space-y-3 hidden animate-fadeIn">
                    <div th:if="${registerError}" class="bg-[#BD114A]/10 border border-[#BD114A] text-[#BD114A] px-4 py-3 rounded-lg mb-4 text-sm text-center font-medium shadow-sm">
                        <span th:text="${registerError}"></span>
                    </div>
                    <div th:if="${registerSuccess}" class="bg-green-500/10 border border-green-500 text-green-400 px-4 py-3 rounded-lg mb-4 text-sm text-center font-medium shadow-sm">
                        <span th:text="${registerSuccess}"></span>
                    </div>
                    <form th:action="@{/register}" th:method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <!-- Nama Lengkap -->
                        <div class="space-y-1">
                            <label class="block text-xs font-medium text-gray-300">Nama Lengkap</label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                                    </svg>
                                </span>
                                <input 
                                    type="text" 
                                    id="regName"
                                    name="name"
                                    class="w-full pl-10 pr-4 py-2.5 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 text-sm outline-none input-glow transition-all duration-300 filled-input"
                                    placeholder="Nama lengkap"
                                    required
                                >
                            </div>
                        </div>
                        
                        <!-- Username -->
                        <div class="space-y-1 mt-2">
                            <label class="block text-xs font-medium text-gray-300">Username</label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                        <path d="M8 9a3 3 0 100-6 3 3 0 000 6zM8 11a6 6 0 016 6H2a6 6 0 016-6z" />
                                        <path fill-rule="evenodd" d="M18 19a1 1 0 01-1 1H5a1 1 0 01-1-1v-1a1 1 0 011-1h12a1 1 0 011 1v1z" clip-rule="evenodd" />
                                    </svg>
                                </span>
                                <input 
                                    type="text" 
                                    id="regUsername"
                                    name="username"
                                    class="w-full pl-10 pr-4 py-2.5 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 text-sm outline-none input-glow transition-all duration-300"
                                    placeholder="Username"
                                    required
                                >
                            </div>
                        </div>
                        
                        <!-- Address -->
                        <div class="space-y-1 mt-2">
                            <label class="block text-xs font-medium text-gray-300">Alamat</label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" />
                                    </svg>
                                </span>
                                <input 
                                    type="text" 
                                    id="regAddress"
                                    name="address"
                                    class="w-full pl-10 pr-4 py-2.5 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 text-sm outline-none input-glow transition-all duration-300 filled-input"
                                    placeholder="Alamat (opsional)"
                                >
                            </div>
                        </div>
                        
                        <!-- Gender -->
                        <div class="space-y-1 mt-2">
                            <label class="block text-xs font-medium text-gray-300">Jenis Kelamin</label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd" />
                                    </svg>
                                </span>
                                <select 
                                    id="regGender"
                                    name="gender"
                                    class="w-full pl-10 pr-4 py-2.5 bg-white/10 border border-white/20 rounded-lg text-white text-sm outline-none input-glow transition-all duration-300 filled-input"
                                >
                                    <option value="" class="text-gray-900">Pilih (opsional)</option>
                                    <option value="Laki-Laki" class="text-gray-900">Laki-Laki</option>
                                    <option value="Perempuan" class="text-gray-900">Perempuan</option>
                                </select>
                            </div>
                        </div>
                        
                        <!-- Password -->
                        <div class="space-y-1 mt-2">
                            <label class="block text-xs font-medium text-gray-300">Password</label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                                    </svg>
                                </span>
                                <input 
                                    type="password" 
                                    id="regPassword"
                                    name="password"
                                    class="w-full pl-10 pr-10 py-2.5 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 text-sm outline-none input-glow transition-all duration-300"
                                    placeholder="Password"
                                    required
                                >
                                <button 
                                    type="button" 
                                    onclick="togglePassword('regPassword', this)"
                                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white transition-colors"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 eye-open" viewBox="0 0 20 20" fill="currentColor">
                                        <path d="M10 12a2 2 0 100-4 2 2 0 000 4z" />
                                        <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd" />
                                    </svg>
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 eye-closed hidden" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.45l1.514 1.514a4 4 0 00-5.478-5.478z" clip-rule="evenodd" />
                                        <path d="M12.454 16.697L9.75 13.992a4 4 0 01-3.742-3.741L2.335 6.578A9.98 9.98 0 00.458 10c1.274 4.057 5.065 7 9.542 7 .847 0 1.669-.105 2.454-.303z" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                        
                        <!-- Konfirmasi Password -->
                        <div class="space-y-1 mt-2">
                            <label class="block text-xs font-medium text-gray-300">Konfirmasi Password</label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                                    </svg>
                                </span>
                                <input 
                                    type="password" 
                                    id="regConfirmPassword"
                                    class="w-full pl-10 pr-10 py-2.5 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 text-sm outline-none input-glow transition-all duration-300 filled-input"
                                    placeholder="Ulangi password"
                                    required
                                    oninput="validatePasswordMatch()"
                                >
                            </div>
                            <p id="passwordMatchError" class="text-xs text-[#BD114A] mt-1 hidden">Password tidak cocok!</p>
                        </div>
                        
                        <!-- Submit Button -->
                        <button 
                            type="submit" 
                            id="registerSubmitBtn"
                            class="w-full gradient-btn text-white font-medium py-2.5 rounded-lg mt-4 flex items-center justify-center gap-2 text-sm disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            <span>Daftar</span>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M8 9a3 3 0 100-6 3 3 0 000 6zM8 11a6 6 0 016 6H2a6 6 0 016-6z" />
                                <path fill-rule="evenodd" d="M18 19a1 1 0 01-1 1H5a1 1 0 01-1-1v-1a1 1 0 011-1h12a1 1 0 011 1v1z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </form>

                </div>
                
            </div>
        </div>
        
    </div>
    
    <!-- Success/Error Toast -->
    <div id="toast" class="fixed top-5 right-5 z-50 hidden">
        <div class="bg-green-500 text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
            </svg>
            <span id="toastMessage">Berhasil!</span>
        </div>
    </div>
    
    <script th:inline="javascript">
        // Toggle between Login and Register forms
        function showLogin() {
            document.getElementById('formLogin').classList.remove('hidden');
            document.getElementById('formRegister').classList.add('hidden');
            
            document.getElementById('tabLogin').classList.add('bg-white', 'text-gray-900');
            document.getElementById('tabLogin').classList.remove('text-white/70', 'hover:text-white');
            document.getElementById('tabRegister').classList.remove('bg-white', 'text-gray-900');
            document.getElementById('tabRegister').classList.add('text-white/70', 'hover:text-white');
        }
        
        function showRegister() {
            document.getElementById('formRegister').classList.remove('hidden');
            document.getElementById('formLogin').classList.add('hidden');
            
            document.getElementById('tabRegister').classList.add('bg-white', 'text-gray-900');
            document.getElementById('tabRegister').classList.remove('text-white/70', 'hover:text-white');
            document.getElementById('tabLogin').classList.remove('bg-white', 'text-gray-900');
            document.getElementById('tabLogin').classList.add('text-white/70', 'hover:text-white');
        }
        
        // Toggle password visibility
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const eyeOpen = button.querySelector('.eye-open');
            const eyeClosed = button.querySelector('.eye-closed');
            
            if (input.type === 'password') {
                input.type = 'text';
                eyeOpen.classList.add('hidden');
                eyeClosed.classList.remove('hidden');
            } else {
                input.type = 'password';
                eyeOpen.classList.remove('hidden');
                eyeClosed.classList.add('hidden');
            }
        }
        
        // Validate password match
        function validatePasswordMatch() {
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const errorMsg = document.getElementById('passwordMatchError');
            const submitBtn = document.getElementById('registerSubmitBtn');
            
            if (confirmPassword.length > 0 && password !== confirmPassword) {
                errorMsg.classList.remove('hidden');
                submitBtn.disabled = true;
            } else {
                errorMsg.classList.add('hidden');
                submitBtn.disabled = false;
            }
        }
        
        // Show toast notification
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toastMessage.textContent = message;
            toast.querySelector('div').className = type === 'success' 
                ? 'bg-green-500 text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-3'
                : 'bg-red-500 text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-3';
            
            toast.classList.remove('hidden');
            
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }
        
        // Dynamic input styling for filled-input fields
        document.querySelectorAll('.filled-input').forEach(input => {
            input.addEventListener('input', function() {
                if (this.value.length > 0) {
                    this.classList.add('has-value');
                } else {
                    this.classList.remove('has-value');
                }
            });
        });
        
        // Auto-show register tab if showRegister is true (from redirect)
        document.addEventListener('DOMContentLoaded', function() {
            const showRegister = /*[[${showRegister != null ? showRegister : false}]]*/ false;
            if (showRegister) {
                showRegister();
            }
        });
    </script>
    
</body>
</html>
