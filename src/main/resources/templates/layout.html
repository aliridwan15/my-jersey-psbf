<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - myjersey Admin'">myjersey Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#BD114A',
                    },
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Poppins', sans-serif; }
        
        .sidebar-menu-item:hover { background-color: rgba(255, 255, 255, 0.15); }
        .sidebar-menu-item.active { background-color: rgba(255, 255, 255, 0.25); }
        
        .profile-dropdown { transform-origin: bottom; transition: all 0.15s ease-out; }
        .profile-dropdown.hidden { opacity: 0; transform: scaleY(0.95); }
        .profile-dropdown:not(.hidden) { opacity: 1; transform: scaleY(1); }
        
        .stat-card { transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1); }
        
        .table-row:hover { background-color: rgba(189, 17, 74, 0.03); }
        
        .modal-overlay { transition: opacity 0.2s ease-out; }
        .modal-overlay.hidden { opacity: 0; pointer-events: none; }
        .modal-overlay:not(.hidden) { opacity: 1; }
        
        .modal-content { transition: all 0.2s ease-out; }
        .modal-overlay.hidden .modal-content { transform: scale(0.95); opacity: 0; }
        .modal-overlay:not(.hidden) .modal-content { transform: scale(1); opacity: 1; }
        
        #sidebar { transition: transform 300ms ease-in-out; }
        #mainContent { transition: margin-left 300ms ease-in-out; }
        
        .burger-btn { transition: all 0.2s ease; }
        .burger-btn:hover { background-color: rgba(189, 17, 74, 0.1); }
        .burger-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-gray-100 font-poppins">

    <!-- ========== SIDEBAR ========== -->
    <aside th:fragment="sidebar(activePage)" id="sidebar" class="w-64 bg-primary text-white flex flex-col fixed h-full z-50 transform translate-x-0">
        
        <!-- Logo -->
        <div class="p-6 border-b border-white/20">
            <h1 class="text-xl font-bold tracking-tight">myjersey Admin</h1>
        </div>
        
        <!-- Navigation Menu -->
        <nav class="flex-1 py-4">
            <div class="px-4 mb-2 text-xs font-semibold text-white/50 uppercase tracking-wider">
                Menu Utama
            </div>
            
            <a href="/admin.html" th:class="${activePage == 'dashboard'} ? 'sidebar-menu-item active flex items-center gap-3 px-6 py-3 text-sm transition-all duration-200' : 'sidebar-menu-item flex items-center gap-3 px-6 py-3 text-sm transition-all duration-200'">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                Dashboard
            </a>
            
            <a href="/admin/teams" th:class="${activePage == 'teams'} ? 'sidebar-menu-item active flex items-center gap-3 px-6 py-3 text-sm transition-all duration-200' : 'sidebar-menu-item flex items-center gap-3 px-6 py-3 text-sm transition-all duration-200'">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
                Kelola Tim
            </a>
            
            <a href="/admin/jerseys" class="sidebar-menu-item flex items-center gap-3 px-6 py-3 text-sm transition-all duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                Kelola Produk Jersey
            </a>
            
            <a th:href="@{/admin/orders}" class="sidebar-menu-item flex items-center gap-3 px-6 py-3 text-sm transition-all duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                </svg>
                Kelola Order
            </a>
        </nav>
        
        <!-- Profile Section -->
        <div class="relative">
            <button id="profileBtn" type="button" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-white/10 transition-colors cursor-pointer">
                <div class="w-9 h-9 rounded-full bg-white/20 flex items-center justify-center flex-shrink-0 overflow-hidden">
                    <img th:src="@{/admin/profile/photo/{id}(id=${currentUser.id})}" 
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" 
                         class="w-full h-full object-cover"
                         alt="Profile">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 hidden" style="display:none;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </div>
                <div class="flex-1 text-left">
                    <p class="text-sm font-medium" th:text="${currentUser.name}">Nama User</p>
                    <p class="text-xs text-white/60" th:text="${currentUser.role}">Role</p>
                </div>
                <svg id="dropdownArrow" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white/60 transition-transform duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                </svg>
            </button>
            
            <!-- Dropdown Menu (Opens UPWARD) -->
                <div id="profileDropdown" class="profile-dropdown hidden absolute left-0 right-0 bottom-full mb-2 bg-white rounded-lg shadow-2xl overflow-hidden z-50">
                    <a href="/admin/profile" class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        Kelola Profil
                    </a>
                <div class="border-t border-gray-100"></div>
                <a href="/login" class="flex items-center gap-3 px-4 py-3 text-sm text-red-700 hover:bg-red-50 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    Exit
                </a>
            </div>
        </div>
    </aside>
    
    <!-- ========== HEADER ========== -->
    <header th:fragment="header(pageTitle)" class="bg-[#EEEEEE] shadow-sm sticky top-0 z-40">
        <div class="flex items-center px-6 py-4">
            <!-- Hamburger Button -->
            <button id="burgerBtn" type="button" class="burger-btn flex items-center justify-center w-10 h-10 rounded-lg hover:bg-primary/10 focus:outline-none focus:ring-2 focus:ring-primary/30" aria-label="Toggle Sidebar">
                <div class="flex flex-col items-center justify-center space-y-1.5">
                    <span class="block w-6 h-0.5 bg-[#BD114A] rounded-full"></span>
                    <span class="block w-6 h-0.5 bg-[#BD114A] rounded-full"></span>
                    <span class="block w-6 h-0.5 bg-[#BD114A] rounded-full"></span>
                </div>
            </button>
            
            <!-- Page Title -->
            <div class="ml-4">
                <h2 class="text-lg font-semibold text-gray-800" th:text="${pageTitle}">Dashboard</h2>
            </div>
        </div>
    </header>
    
    <!-- ========== DYNAMIC CONTENT ========== -->
    <div th:fragment="content" class="p-8">
        <th:block th:replace="${content}" />
    </div>
    
    <!-- ========== JAVASCRIPT ========== -->
    <script th:fragment="scripts">
        // Sidebar Toggle
        const burgerBtn = document.getElementById('burgerBtn');
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        
        if (burgerBtn && sidebar && mainContent) {
            burgerBtn.addEventListener('click', function() {
                sidebar.classList.toggle('-translate-x-full');
                
                if (sidebar.classList.contains('-translate-x-full')) {
                    mainContent.classList.remove('ml-64');
                    mainContent.classList.add('ml-0');
                } else {
                    mainContent.classList.remove('ml-0');
                    mainContent.classList.add('ml-64');
                }
            });
        }
        
        // Profile Dropdown Toggle
        const profileBtn = document.getElementById('profileBtn');
        const profileDropdown = document.getElementById('profileDropdown');
        const dropdownArrow = document.getElementById('dropdownArrow');
        
        if (profileBtn && profileDropdown) {
            profileBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                profileDropdown.classList.toggle('hidden');
                if (dropdownArrow) {
                    dropdownArrow.style.transform = profileDropdown.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
                }
            });
            
            document.addEventListener('click', function(e) {
                if (!profileBtn.contains(e.target) && !profileDropdown.contains(e.target)) {
                    profileDropdown.classList.add('hidden');
                    if (dropdownArrow) dropdownArrow.style.transform = 'rotate(0deg)';
                }
            });
            
            profileDropdown.addEventListener('click', function(e) {
                e.stopPropagation();
            });
        }
        
        // Modal Functions
        function openModal(modalId) {
            document.getElementById(modalId).classList.remove('hidden');
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
        }
        
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.add('hidden');
                }
            });
        });
    </script>
    
</body>
</html>
