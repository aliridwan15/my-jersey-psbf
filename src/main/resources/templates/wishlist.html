<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist - myjersey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#BD114A',
                        secondary: '#1A1A2E',
                    },
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Poppins', sans-serif; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(189, 17, 74, 0.15); }
    </style>
</head>
<body class="bg-gray-50 font-poppins min-h-screen flex flex-col">

    <nav th:replace="~{fragments/header :: header}"></nav>

    <div class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <!-- Success/Error Messages -->
        <div th:if="${successMessage}" class="mb-6 p-4 bg-green-50 border border-green-200 rounded-xl flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span class="text-green-800 font-medium" th:text="${successMessage}">Sukses!</span>
        </div>
        
        <div th:if="${errorMessage}" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-xl flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span class="text-red-800 font-medium" th:text="${errorMessage}">Error!</span>
        </div>

        <!-- Page Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-secondary">Wishlist</h1>
            <p class="text-gray-500 mt-1">Jersey yang kamu simpan (<span th:text="${wishlistItems != null ? wishlistItems.size() : 0}">0</span> item)</p>
        </div>

        <!-- Empty State -->
        <div th:if="${wishlistItems == null or #lists.isEmpty(wishlistItems)}" class="bg-white rounded-2xl shadow-sm p-16 text-center">
            <div class="w-24 h-24 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                </svg>
            </div>
            <h3 class="text-xl font-semibold text-gray-700 mb-2">Wishlist Kosong</h3>
            <p class="text-gray-500 mb-6">Simpan jersey favoritmu di sini</p>
            <a href="/products" class="inline-flex items-center gap-2 px-6 py-3 bg-primary text-white rounded-xl font-medium hover:bg-pink-800 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                Jelajahi Jersey
            </a>
        </div>

        <!-- Wishlist Grid -->
        <div th:unless="${wishlistItems == null or #lists.isEmpty(wishlistItems)}" 
             class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            
            <div th:each="item : ${wishlistItems}" class="card-hover bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100">
                
                <!-- Product Image Container -->
                <div class="relative h-48 bg-gray-100 overflow-hidden">
                    <a th:href="@{/product/{id}(id=${item.jersey.id})}" class="block h-full">
                        <img th:if="${item.jersey.imageBase64 != null and !item.jersey.imageBase64.isEmpty()}" 
                             th:src="@{'data:image/png;base64,' + ${item.jersey.imageBase64}}" 
                             alt="Product" class="w-full h-full object-cover">
                        <img th:unless="${item.jersey.imageBase64 != null and !item.jersey.imageBase64.isEmpty()}" 
                             src="https://images.unsplash.com/photo-1583316174775-bd6dc0e9f298?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80" 
                             alt="Product" class="w-full h-full object-cover">
                    </a>
                    
                    <!-- Remove Button -->
                    <form th:id="'remove-form-' + ${item.id}" th:action="@{/wishlist/remove/{id}(id=${item.id})}" method="get" class="inline"></form>
                    <button type="button" th:onclick="'openRemoveModal(' + ${item.id} + ')'"
                            class="absolute top-3 right-3 w-10 h-10 bg-white/90 hover:bg-red-500 text-gray-600 hover:text-white rounded-full flex items-center justify-center shadow-md transition-colors z-10">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                        </svg>
                    </button>
                </div>
                
                <!-- Product Info -->
                <div class="p-4">
                    <p class="text-xs text-gray-500 mb-1" th:text="${item.jersey.league?.name}">Premier League</p>
                    <h3 class="font-semibold text-secondary line-clamp-2 mb-2" th:text="${item.jersey.name}">Manchester United Home Jersey 2024</h3>
                    <p class="text-xs text-gray-500 mb-2" th:text="${item.jersey.brand?.name}">Nike</p>
                    
                    <div class="flex items-center justify-between">
                        <span class="text-lg font-bold text-primary" th:text="'Rp ' + ${#numbers.formatDecimal(item.jersey.price, 0, 'POINT', 0, 'POINT')}">Rp 350.000</span>
                    </div>
                    
                    <!-- Add to Cart Button with Size Selector -->
                    <form th:action="@{/cart/add}" method="post" class="w-full mt-4">
                        <input type="hidden" name="jerseyId" th:value="${item.jersey.id}" />
                        
                        <div class="mb-4">
                            <p class="text-xs font-semibold text-gray-700 mb-2">Pilih Ukuran <span class="text-red-500">*</span></p>
                            <div class="flex flex-wrap gap-2">
                                <label class="cursor-pointer">
                                    <input type="radio" name="size" value="S" class="peer sr-only" required th:disabled="${item.jersey.stockS == null or item.jersey.stockS <= 0}">
                                    <div class="w-8 h-8 flex items-center justify-center rounded border border-gray-300 text-xs font-bold text-gray-700 peer-checked:bg-gray-900 peer-checked:text-white peer-checked:border-gray-900 peer-disabled:opacity-40 peer-disabled:cursor-not-allowed peer-disabled:bg-gray-100 transition-all">S</div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="size" value="M" class="peer sr-only" checked th:disabled="${item.jersey.stockM == null or item.jersey.stockM <= 0}">
                                    <div class="w-8 h-8 flex items-center justify-center rounded border border-gray-300 text-xs font-bold text-gray-700 peer-checked:bg-gray-900 peer-checked:text-white peer-checked:border-gray-900 peer-disabled:opacity-40 peer-disabled:cursor-not-allowed peer-disabled:bg-gray-100 transition-all">M</div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="size" value="L" class="peer sr-only" th:disabled="${item.jersey.stockL == null or item.jersey.stockL <= 0}">
                                    <div class="w-8 h-8 flex items-center justify-center rounded border border-gray-300 text-xs font-bold text-gray-700 peer-checked:bg-gray-900 peer-checked:text-white peer-checked:border-gray-900 peer-disabled:opacity-40 peer-disabled:cursor-not-allowed peer-disabled:bg-gray-100 transition-all">L</div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="size" value="XL" class="peer sr-only" th:disabled="${item.jersey.stockXL == null or item.jersey.stockXL <= 0}">
                                    <div class="w-8 h-8 flex items-center justify-center rounded border border-gray-300 text-xs font-bold text-gray-700 peer-checked:bg-gray-900 peer-checked:text-white peer-checked:border-gray-900 peer-disabled:opacity-40 peer-disabled:cursor-not-allowed peer-disabled:bg-gray-100 transition-all">XL</div>
                                </label>
                            </div>
                        </div>

                        <button type="submit" class="w-full flex items-center justify-center bg-gray-900 hover:bg-red-600 text-white py-2 px-4 rounded-lg text-sm font-semibold transition-colors duration-300">
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                            Tambah ke Keranjang
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <script>
        let currentRemoveId = null;

        function openRemoveModal(itemId) {
            currentRemoveId = itemId;
            document.getElementById('removeModal').classList.remove('hidden');
            document.getElementById('removeModal').classList.add('flex');
        }

        function closeRemoveModal() {
            currentRemoveId = null;
            document.getElementById('removeModal').classList.add('hidden');
            document.getElementById('removeModal').classList.remove('flex');
        }

        function confirmRemove() {
            if (currentRemoveId) {
                const form = document.getElementById('remove-form-' + currentRemoveId);
                if (form) {
                    form.submit();
                }
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeRemoveModal();
            }
        });
    </script>

    <!-- Remove Confirmation Modal -->
    <div id="removeModal" class="hidden fixed inset-0 z-50 items-center justify-center bg-black/60 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 overflow-hidden">
            <div class="p-6 text-center">
                <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-gray-900 mb-2">Hapus dari Wishlist?</h3>
                <p class="text-gray-500 mb-6">Jersey ini akan dihapus dari daftar wishlist kamu.</p>
                <div class="flex gap-3">
                    <button onclick="closeRemoveModal()" class="flex-1 px-4 py-3 bg-gray-100 text-gray-700 font-semibold rounded-xl hover:bg-gray-200 transition-colors">
                        Batal
                    </button>
                    <button onclick="confirmRemove()" class="flex-1 px-4 py-3 bg-red-600 text-white font-semibold rounded-xl hover:bg-red-700 transition-colors">
                        Hapus
                    </button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
