<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan Toko - myjersey Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#BD114A',
                        secondary: '#EEEEEE',
                        accent: '#547792',
                        success: '#7FB77E',
                        warning: '#FAE251',
                    },
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Poppins', sans-serif; }
        
        .sidebar-menu-item:hover { background-color: rgba(255, 255, 255, 0.15); }
        .sidebar-menu-item.active { background-color: rgba(255, 255, 255, 0.25); }
        
        .profile-dropdown { transform-origin: bottom; transition: all 0.15s ease-out; }
        .profile-dropdown.hidden { opacity: 0; transform: scaleY(0.95); }
        .profile-dropdown:not(.hidden) { opacity: 1; transform: scaleY(1); }
        
        #sidebar { transition: transform 300ms ease-in-out; }
        #mainContent { transition: margin-left 300ms ease-in-out; }
        
        .burger-btn { transition: all 0.2s ease; }
        .burger-btn:hover { background-color: rgba(189, 17, 74, 0.1); }
        .burger-btn:active { transform: scale(0.95); }
        
        #map { height: 350px; border-radius: 12px; z-index: 0; }
        
        .leaflet-container { background: #f3f4f6; }
    </style>
</head>
<body class="bg-gray-100 font-poppins">
    
    <!-- Main Container -->
    <div class="flex min-h-screen">
        
        <!-- Sidebar Fragment -->
        <aside th:replace="~{fragments/sidebar :: sidebar(activeMenu='storeProfile')}"></aside>
        
        <!-- ========== MAIN CONTENT ========== -->
        <main id="mainContent" class="flex-1 ml-64 transition-all duration-300 ease-in-out">
            
            <!-- Header with Hamburger Menu -->
            <header class="bg-[#EEEEEE] shadow-sm sticky top-0 z-40">
                <div class="flex items-center px-6 py-4">
                    <button id="burgerBtn" type="button" class="burger-btn flex items-center justify-center w-10 h-10 rounded-lg hover:bg-primary/10 focus:outline-none focus:ring-2 focus:ring-primary/30" aria-label="Toggle Sidebar">
                        <div class="flex flex-col items-center justify-center space-y-1.5">
                            <span class="block w-6 h-0.5 bg-[#BD114A] rounded-full"></span>
                            <span class="block w-6 h-0.5 bg-[#BD114A] rounded-full"></span>
                            <span class="block w-6 h-0.5 bg-[#BD114A] rounded-full"></span>
                        </div>
                    </button>
                    <div class="ml-4">
                        <h2 class="text-lg font-semibold text-gray-800">Pengaturan Toko</h2>
                    </div>
                </div>
            </header>
            
            <!-- Content -->
            <div class="p-6">
                
                <!-- Alert Messages -->
                <div th:if="${successMessage}" class="mb-4 p-4 bg-success/10 text-success rounded-lg text-sm font-medium flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span th:text="${successMessage}"></span>
                </div>
                
                <!-- Form Card -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
                        <h3 class="text-lg font-semibold text-gray-800">Informasi Toko</h3>
                        <div class="flex items-center gap-2 text-sm text-gray-500">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            <span>Geser marker untuk menentukan lokasi</span>
                        </div>
                    </div>
                    
                    <form th:action="@{/admin/store-profile/save}" method="POST" enctype="multipart/form-data" class="p-6" id="storeForm">
                        <input type="hidden" name="latitude" id="lat" th:value="${storeProfile.latitude}">
                        <input type="hidden" name="longitude" id="lng" th:value="${storeProfile.longitude}">
                        
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <!-- Left Column -->
                            <div class="space-y-5">
                                
                                <!-- Logo Preview -->
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Logo Toko</label>
                                    <div class="flex items-start gap-4">
                                        <div class="w-24 h-24 rounded-xl border-2 border-dashed border-gray-300 flex items-center justify-center bg-gray-50 overflow-hidden" id="logoPreviewContainer">
                                            <img th:if="${storeProfile.logoImage != null and !storeProfile.logoImage.isEmpty()}" 
                                                 th:src="${storeProfile.logoImage}" 
                                                 alt="Logo Toko" 
                                                 class="w-full h-full object-contain p-2">
                                            <svg th:unless="${storeProfile.logoImage != null and !storeProfile.logoImage.isEmpty()}" 
                                                 xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                                                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                            </svg>
                                        </div>
                                        <div class="flex-1">
                                            <input type="file" id="logoInput" accept="image/*" class="hidden" onchange="previewLogo(this)">
                                            <label for="logoInput" class="inline-flex items-center gap-2 px-4 py-2 bg-gray-100 text-gray-700 text-sm font-medium rounded-lg cursor-pointer hover:bg-gray-200 transition-colors">
                                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                                                </svg>
                                                Pilih Logo
                                            </label>
                                            <input type="hidden" name="logoBase64" id="logoBase64">
                                            <p class="text-xs text-gray-400 mt-2">Format: JPG, PNG. Maks 2MB</p>
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- Store Name -->
                                <div>
                                    <label for="storeName" class="block text-sm font-medium text-gray-700 mb-2">Nama Toko</label>
                                    <input type="text" id="storeName" name="storeName" th:value="${storeProfile.storeName}"
                                           class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors"
                                           placeholder="Masukkan nama toko" required>
                                </div>
                                
                                <!-- Phone & Email -->
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label for="phoneNumber" class="block text-sm font-medium text-gray-700 mb-2">Nomor HP</label>
                                        <input type="text" id="phoneNumber" name="phoneNumber" th:value="${storeProfile.phoneNumber}"
                                               class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors"
                                               placeholder="08xxxxxxxxxx">
                                    </div>
                                    <div>
                                        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                                        <input type="email" id="email" name="email" th:value="${storeProfile.email}"
                                               class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors"
                                               placeholder="toko@email.com">
                                    </div>
                                </div>
                                
                                <!-- Full Address -->
                                <div>
                                    <label for="fullAddress" class="block text-sm font-medium text-gray-700 mb-2">Alamat Lengkap</label>
                                    <textarea id="fullAddress" name="fullAddress" rows="3"
                                              class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors resize-none"
                                              placeholder="Masukkan alamat lengkap toko" th:text="${storeProfile.fullAddress}"></textarea>
                                </div>
                                
                                <!-- About Us -->
                                <div>
                                    <label for="aboutUs" class="block text-sm font-medium text-gray-700 mb-2">Tentang Kami</label>
                                    <textarea id="aboutUs" name="aboutUs" rows="4"
                                              class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors resize-none"
                                              placeholder="Deskripsikan toko Anda..." th:text="${storeProfile.aboutUs}"></textarea>
                                </div>
                                
                                <!-- Submit Button -->
                                <div class="pt-4">
                                    <button type="submit" class="w-full lg:w-auto px-6 py-3 bg-primary text-white font-medium rounded-lg hover:bg-pink-700 transition-colors flex items-center justify-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                                        </svg>
                                        Simpan Pengaturan
                                    </button>
                                </div>
                            </div>
                            
                            <!-- Right Column - Map -->
                            <div class="space-y-2">
                                <label class="block text-sm font-medium text-gray-700">Lokasi Toko</label>
                                <p class="text-xs text-gray-400">Geser marker merah untuk menentukan titik koordinat lokasi toko</p>
                                <div id="map" class="w-full"></div>
                                <div class="flex items-center gap-4 text-xs text-gray-500 bg-gray-50 p-3 rounded-lg">
                                    <div class="flex items-center gap-2">
                                        <div class="w-3 h-3 rounded-full bg-primary"></div>
                                        <span>Latitude: <span id="displayLat" th:text="${storeProfile.latitude}">-7.2575</span></span>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <div class="w-3 h-3 rounded-full bg-accent"></div>
                                        <span>Longitude: <span id="displayLng" th:text="${storeProfile.longitude}">112.7521</span></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                
            </div>
        </main>
    </div>
    
    <script th:inline="javascript">
        /*<![CDATA[*/
        const initialLat = /*[[${storeProfile.latitude}]]*/ -7.2575;
        const initialLng = /*[[${storeProfile.longitude}]]*/ 112.7521;
        /*]]>*/
        
        // Initialize map
        const map = L.map('map').setView([initialLat, initialLng], 15);
        
        // Add OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);
        
        // Custom marker icon
        const redIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });
        
        // Create draggable marker
        let marker = L.marker([initialLat, initialLng], {
            draggable: true,
            icon: redIcon
        }).addTo(map);
        
        // Update coordinates on marker drag
        marker.on('dragend', function(e) {
            const lat = marker.getLatLng().lat;
            const lng = marker.getLatLng().lng;
            
            document.getElementById('lat').value = lat;
            document.getElementById('lng').value = lng;
            document.getElementById('displayLat').textContent = lat.toFixed(6);
            document.getElementById('displayLng').textContent = lng.toFixed(6);
        });
        
        // Also update when clicking on map
        map.on('click', function(e) {
            marker.setLatLng(e.latlng);
            document.getElementById('lat').value = e.latlng.lat;
            document.getElementById('lng').value = e.latlng.lng;
            document.getElementById('displayLat').textContent = e.latlng.lat.toFixed(6);
            document.getElementById('displayLng').textContent = e.latlng.lng.toFixed(6);
        });
        
        // Logo preview function
        function previewLogo(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                
                if (file.size > 2 * 1024 * 1024) {
                    alert('Ukuran file terlalu besar. Maksimum 2MB.');
                    input.value = '';
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('logoPreviewContainer').innerHTML = 
                        '<img src="' + e.target.result + '" alt="Logo Preview" class="w-full h-full object-contain p-2">';
                    document.getElementById('logoBase64').value = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }
    </script>
    
    <script>
        // SIDEBAR TOGGLE
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const burgerBtn = document.getElementById('burgerBtn');
        let sidebarOpen = true;
        
        burgerBtn.addEventListener('click', function() {
            sidebarOpen = !sidebarOpen;
            if (sidebarOpen) {
                sidebar.style.transform = 'translateX(0)';
                mainContent.style.marginLeft = '256px';
            } else {
                sidebar.style.transform = 'translateX(-100%)';
                mainContent.style.marginLeft = '0';
            }
        });
        
        // PROFILE DROPDOWN
        const profileBtn = document.getElementById('profileBtn');
        const profileDropdown = document.getElementById('profileDropdown');
        const dropdownArrow = document.getElementById('dropdownArrow');
        
        if (profileBtn && profileDropdown) {
            profileBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                profileDropdown.classList.toggle('hidden');
                dropdownArrow.classList.toggle('rotate-180');
            });
            
            document.addEventListener('click', function() {
                if (!profileDropdown.classList.contains('hidden')) {
                    profileDropdown.classList.add('hidden');
                    dropdownArrow.classList.remove('rotate-180');
                }
            });
        }
    </script>
    
</body>
</html>
