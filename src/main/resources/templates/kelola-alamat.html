<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Alamat - myjersey Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#BD114A',
                        secondary: '#EEEEEE',
                        accent: '#547792',
                        success: '#7FB77E',
                        warning: '#FAE251',
                    },
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Poppins', sans-serif; }
        
        .sidebar-menu-item:hover { background-color: rgba(255, 255, 255, 0.15); }
        .sidebar-menu-item.active { background-color: rgba(255, 255, 255, 0.25); }
        
        .profile-dropdown { transform-origin: bottom; transition: all 0.15s ease-out; }
        .profile-dropdown.hidden { opacity: 0; transform: scaleY(0.95); }
        .profile-dropdown:not(.hidden) { opacity: 1; transform: scaleY(1); }
        
        .table-row:hover { background-color: rgba(189, 17, 74, 0.03); }
        
        .modal-overlay { transition: opacity 0.2s ease-out; }
        .modal-overlay.hidden { opacity: 0; pointer-events: none; }
        .modal-overlay:not(.hidden) { opacity: 1; }
        
        .modal-content { transition: all 0.2s ease-out; }
        .modal-overlay.hidden .modal-content { transform: scale(0.95); opacity: 0; }
        .modal-overlay:not(.hidden) .modal-content { transform: scale(1); opacity: 1; }
        
        #sidebar { transition: transform 300ms ease-in-out; }
        #mainContent { transition: margin-left 300ms ease-in-out; }
        
        .burger-btn { transition: all 0.2s ease; }
        .burger-btn:hover { background-color: rgba(189, 17, 74, 0.1); }
        .burger-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-gray-100 font-poppins">
    
    <!-- Main Container -->
    <div class="flex min-h-screen">
        
        <!-- Sidebar Fragment -->
        <aside th:replace="~{fragments/sidebar :: sidebar(activeMenu='user')}"></aside>
        
        <!-- ========== MAIN CONTENT ========== -->
        <main id="mainContent" class="flex-1 ml-64 transition-all duration-300 ease-in-out">
            
            <!-- Header with Hamburger Menu -->
            <header class="bg-[#EEEEEE] shadow-sm sticky top-0 z-40">
                <div class="flex items-center px-6 py-4">
                    <button id="burgerBtn" type="button" class="burger-btn flex items-center justify-center w-10 h-10 rounded-lg hover:bg-primary/10 focus:outline-none focus:ring-2 focus:ring-primary/30" aria-label="Toggle Sidebar">
                        <div class="flex flex-col items-center justify-center space-y-1.5">
                            <span class="block w-6 h-0.5 bg-[#BD114A] rounded-full"></span>
                            <span class="block w-6 h-0.5 bg-[#BD114A] rounded-full"></span>
                            <span class="block w-6 h-0.5 bg-[#BD114A] rounded-full"></span>
                        </div>
                    </button>
                    <div class="ml-4 flex items-center gap-3">
                        <h2 class="text-lg font-semibold text-gray-800">Kelola Alamat</h2>
                        <span class="text-gray-400">-</span>
                        <h2 class="text-lg font-medium text-gray-600" th:text="${user.name}">Nama User</h2>
                    </div>
                </div>
            </header>
            
            <!-- Content -->
            <div class="p-6">
                
                <!-- Back Button & Actions -->
                <div class="flex justify-between items-center mb-6">
                    <a th:href="@{/admin/users}" class="inline-flex items-center gap-2 px-4 py-2.5 bg-gray-500 hover:bg-gray-600 text-white rounded-lg text-sm font-medium transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                        </svg>
                        Kembali ke Data Pengguna
                    </a>
                    <button onclick="openAddModal()" class="inline-flex items-center gap-2 px-5 py-2.5 bg-primary hover:bg-pink-800 text-white rounded-lg text-sm font-semibold transition-colors shadow-md">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                        </svg>
                        Tambah Alamat
                    </button>
                </div>
                
                <!-- Alert Messages -->
                <div th:if="${successMessage}" class="mb-4 p-4 bg-success/10 text-success rounded-lg text-sm font-medium flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span th:text="${successMessage}"></span>
                </div>
                
                <!-- User Info Card -->
                <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
                    <div class="flex items-center gap-4">
                        <div class="w-16 h-16 rounded-full bg-accent/10 flex items-center justify-center">
                            <span class="text-2xl font-bold text-accent" th:text="${#strings.substring(user.name, 0, 2).toUpperCase()}">AR</span>
                        </div>
                        <div>
                            <h3 class="text-lg font-semibold text-gray-800" th:text="${user.name}">Nama User</h3>
                            <p class="text-sm text-gray-500">@<span th:text="${user.username}">username</span></p>
                            <p class="text-sm text-gray-500" th:text="${user.gender != null and user.gender != '' ? user.gender : '-'}">Gender</p>
                        </div>
                    </div>
                </div>
                
                <!-- Addresses Table -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-primary text-white">
                                <tr>
                                    <th class="px-6 py-4 text-sm font-semibold tracking-wide w-32">Label</th>
                                    <th class="px-6 py-4 text-sm font-semibold tracking-wide">Alamat Lengkap</th>
                                    <th class="px-6 py-4 text-sm font-semibold tracking-wide w-32">Kota</th>
                                    <th class="px-6 py-4 text-sm font-semibold tracking-wide w-24">Kode Pos</th>
                                    <th class="px-6 py-4 text-sm font-semibold tracking-wide w-24 text-center">Status</th>
                                    <th class="px-6 py-4 text-sm font-semibold tracking-wide w-32 text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                <tr th:if="${addresses == null or addresses.isEmpty()}">
                                    <td colspan="6" class="px-6 py-12 text-center text-gray-500">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto text-gray-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                                        </svg>
                                        <p class="font-medium">Belum ada alamat</p>
                                        <p class="text-sm mt-1">Tambahkan alamat baru untuk user ini</p>
                                    </td>
                                </tr>
                                <tr th:each="addr : ${addresses}" class="table-row hover:bg-gray-50 transition-colors">
                                    <td class="px-6 py-4">
                                        <div class="flex items-center gap-2">
                                            <span class="inline-flex items-center justify-center w-8 h-8 rounded-lg" th:classappend="${addr.title == 'Rumah' ? 'bg-blue-100 text-blue-600' : (addr.title == 'Kantor' ? 'bg-purple-100 text-purple-600' : 'bg-gray-100 text-gray-600')}">
                                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                                    <path th:if="${addr.title == 'Rumah'}" stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                                                    <path th:unless="${addr.title == 'Rumah'}" stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                                                </svg>
                                            </span>
                                            <span class="font-medium text-gray-800" th:text="${addr.title}">Rumah</span>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4">
                                        <p class="text-sm text-gray-700 max-w-md truncate" th:text="${addr.fullAddress}">Alamat Lengkap</p>
                                    </td>
                                    <td class="px-6 py-4 text-sm text-gray-600" th:text="${addr.city}">Kota</td>
                                    <td class="px-6 py-4 text-sm text-gray-600" th:text="${addr.postalCode != null ? addr.postalCode : '-'}">12345</td>
                                    <td class="px-6 py-4 text-center">
                                        <span th:if="${addr.isDefault}" class="inline-flex items-center gap-1 px-3 py-1 bg-success/10 text-success text-xs font-semibold rounded-full">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                                            </svg>
                                            Utama
                                        </span>
                                        <span th:unless="${addr.isDefault}" class="inline-flex items-center px-3 py-1 bg-gray-100 text-gray-500 text-xs font-medium rounded-full">
                                            Bukan
                                        </span>
                                    </td>
                                    <td class="px-6 py-4">
                                        <div class="flex items-center justify-center gap-2">
                                            <button type="button" 
                                                    th:attr="data-id=${addr.id}, data-title=${addr.title}, data-fullAddress=${addr.fullAddress}, data-city=${addr.city}, data-postalCode=${addr.postalCode != null ? addr.postalCode : ''}, data-isDefault=${addr.isDefault}" 
                                                    onclick="openEditModal(this)"
                                                    class="flex items-center justify-center w-8 h-8 bg-yellow-50 text-yellow-600 rounded-lg hover:bg-secondary hover:text-gray-800 transition-colors border border-yellow-200">
                                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                                                </svg>
                                            </button>
                                            <a th:href="@{/admin/users/{userId}/addresses/delete/{addressId}(userId=${user.id}, addressId=${addr.id})}" 
                                               class="flex items-center justify-center w-8 h-8 bg-red-50 text-red-600 rounded-lg hover:bg-red-600 hover:text-white transition-colors border border-red-100">
                                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                                </svg>
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                
            </div>
        </main>
    </div>
    
    <!-- ========== ADD MODAL ========== -->
    <div id="addModal" class="modal-overlay hidden fixed inset-0 z-[999] bg-black/60 backdrop-blur-sm flex items-center justify-center">
        <div class="modal-content bg-white rounded-2xl shadow-2xl max-w-md w-full mx-4 overflow-hidden border-t-4 border-primary">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                    Tambah Alamat
                </h3>
                <button type="button" onclick="closeModal('addModal')" class="text-gray-400 hover:text-red-500 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <form th:action="@{/admin/users/{userId}/addresses/save(userId=${user.id})}" method="POST" class="p-6 space-y-5">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Label Alamat</label>
                    <select name="title" required class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:outline-none bg-gray-50 focus:bg-white transition-colors">
                        <option value="">Pilih Label</option>
                        <option value="Rumah">Rumah</option>
                        <option value="Kantor">Kantor</option>
                        <option value="Toko">Toko</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Alamat Lengkap</label>
                    <textarea name="fullAddress" rows="3" required class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:outline-none bg-gray-50 focus:bg-white transition-colors" placeholder="Masukkan alamat lengkap"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Kota</label>
                        <input type="text" name="city" required class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:outline-none bg-gray-50 focus:bg-white transition-colors" placeholder="Kota">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Kode Pos</label>
                        <input type="text" name="postalCode" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:outline-none bg-gray-50 focus:bg-white transition-colors" placeholder="12345">
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <input type="checkbox" name="isDefault" id="addIsDefault" value="true" class="w-5 h-5 text-primary border-gray-300 rounded focus:ring-primary">
                    <label for="addIsDefault" class="text-sm text-gray-700">Jadikan alamat utama</label>
                </div>
                <div class="pt-4 flex justify-end gap-3">
                    <button type="button" onclick="closeModal('addModal')" class="px-5 py-2.5 text-gray-600 bg-gray-100 rounded-xl hover:bg-gray-200 font-bold transition-colors">Batal</button>
                    <button type="submit" class="px-5 py-2.5 text-white bg-primary rounded-xl hover:bg-pink-800 font-bold shadow-md hover:shadow-lg transition-all">Simpan</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- ========== EDIT MODAL ========== -->
    <div id="editModal" class="modal-overlay hidden fixed inset-0 z-[999] bg-black/60 backdrop-blur-sm flex items-center justify-center">
        <div class="modal-content bg-white rounded-2xl shadow-2xl max-w-md w-full mx-4 overflow-hidden border-t-4 border-yellow-400">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-warning" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                    </svg>
                    Edit Alamat
                </h3>
                <button type="button" onclick="closeModal('editModal')" class="text-gray-400 hover:text-red-500 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <form th:action="@{/admin/users/{userId}/addresses/save(userId=${user.id})}" method="POST" class="p-6 space-y-5">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="id" id="editId">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Label Alamat</label>
                    <select name="title" id="editTitle" required class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-yellow-400 focus:outline-none bg-gray-50 focus:bg-white transition-colors">
                        <option value="">Pilih Label</option>
                        <option value="Rumah">Rumah</option>
                        <option value="Kantor">Kantor</option>
                        <option value="Toko">Toko</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Alamat Lengkap</label>
                    <textarea name="fullAddress" id="editFullAddress" rows="3" required class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-yellow-400 focus:outline-none bg-gray-50 focus:bg-white transition-colors" placeholder="Masukkan alamat lengkap"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Kota</label>
                        <input type="text" name="city" id="editCity" required class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-yellow-400 focus:outline-none bg-gray-50 focus:bg-white transition-colors" placeholder="Kota">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Kode Pos</label>
                        <input type="text" name="postalCode" id="editPostalCode" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-yellow-400 focus:outline-none bg-gray-50 focus:bg-white transition-colors" placeholder="12345">
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <input type="checkbox" name="isDefault" id="editIsDefault" value="true" class="w-5 h-5 text-warning border-gray-300 rounded focus:ring-yellow-400">
                    <label for="editIsDefault" class="text-sm text-gray-700">Jadikan alamat utama</label>
                </div>
                <div class="pt-4 flex justify-end gap-3">
                    <button type="button" onclick="closeModal('editModal')" class="px-5 py-2.5 text-gray-600 bg-gray-100 rounded-xl hover:bg-gray-200 font-bold transition-colors">Batal</button>
                    <button type="submit" class="px-5 py-2.5 text-gray-800 bg-yellow-400 rounded-xl hover:bg-yellow-500 font-bold shadow-md hover:shadow-lg transition-all">Simpan Perubahan</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        // SIDEBAR TOGGLE
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const burgerBtn = document.getElementById('burgerBtn');
        let sidebarOpen = true;
        
        burgerBtn.addEventListener('click', function() {
            sidebarOpen = !sidebarOpen;
            if (sidebarOpen) {
                sidebar.style.transform = 'translateX(0)';
                mainContent.style.marginLeft = '256px';
            } else {
                sidebar.style.transform = 'translateX(-100%)';
                mainContent.style.marginLeft = '0';
            }
        });
        
        // MODAL FUNCTIONS
        function openModal(modalId) {
            document.getElementById(modalId).classList.remove('hidden');
        }
        
        function openAddModal() {
            document.getElementById('addModal').classList.remove('hidden');
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
        }
        
        // EDIT
        function openEditModal(button) {
            document.getElementById('editId').value = button.getAttribute('data-id');
            document.getElementById('editTitle').value = button.getAttribute('data-title');
            document.getElementById('editFullAddress').value = button.getAttribute('data-fullAddress');
            document.getElementById('editCity').value = button.getAttribute('data-city');
            document.getElementById('editPostalCode').value = button.getAttribute('data-postalCode') || '';
            document.getElementById('editIsDefault').checked = button.getAttribute('data-isDefault') === 'true';
            openModal('editModal');
        }
        
        // PROFILE DROPDOWN
        const profileBtn = document.getElementById('profileBtn');
        const profileDropdown = document.getElementById('profileDropdown');
        const dropdownArrow = document.getElementById('dropdownArrow');
        
        if (profileBtn && profileDropdown) {
            profileBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                profileDropdown.classList.toggle('hidden');
                dropdownArrow.classList.toggle('rotate-180');
            });
            
            document.addEventListener('click', function() {
                if (!profileDropdown.classList.contains('hidden')) {
                    profileDropdown.classList.add('hidden');
                    dropdownArrow.classList.remove('rotate-180');
                }
            });
        }
    </script>
    
</body>
</html>
