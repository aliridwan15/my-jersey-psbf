<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Ulasan Saya - myjersey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#BD114A',
                        secondary: '#1A1A2E',
                        accent: '#547792',
                    },
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Poppins', sans-serif; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08); }
    </style>
</head>
<body class="bg-gray-50 font-poppins min-h-screen flex flex-col">

    <nav th:replace="~{fragments/header :: header}"></nav>

    <div class="flex-grow max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <!-- Page Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-secondary">Riwayat Ulasan Saya</h1>
            <p class="text-gray-500 mt-1">Kumpulan ulasan dan rating yang pernah Anda berikan</p>
        </div>

        <!-- Empty State -->
        <div th:if="${reviews == null or reviews.isEmpty()}" class="bg-white rounded-2xl shadow-sm p-16 text-center">
            <div class="w-24 h-24 bg-yellow-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-yellow-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                </svg>
            </div>
            <h3 class="text-xl font-semibold text-gray-700 mb-2">Belum Ada Ulasan</h3>
            <p class="text-gray-500 mb-6">Anda belum pernah memberikan ulasan pada produk.<br>Beli jersey dan berikan ulasan setelah pesanan selesai!</p>
            <a href="/products" class="inline-flex items-center gap-2 px-6 py-3 bg-primary text-white rounded-xl font-medium hover:bg-pink-800 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                Jelajahi Jersey
            </a>
        </div>

        <!-- Reviews List -->
        <div th:unless="${reviews == null or reviews.isEmpty()}" class="space-y-4">
            
            <div th:each="review : ${reviews}" class="card-hover bg-white rounded-xl shadow-sm border border-gray-200 p-5">
                <div class="flex flex-col sm:flex-row gap-4">
                    
                    <!-- Product Info -->
                    <div class="flex items-start gap-4 sm:w-1/3">
                        <div class="w-20 h-20 bg-gray-100 rounded-lg overflow-hidden flex-shrink-0">
                            <img th:if="${review.jersey.imageBase64 != null and !review.jersey.imageBase64.isEmpty()}" 
                                 th:src="@{'data:image/png;base64,' + ${review.jersey.imageBase64}}" 
                                 alt="Jersey" class="w-full h-full object-cover">
                            <img th:unless="${review.jersey.imageBase64 != null and !review.jersey.imageBase64.isEmpty()}" 
                                 src="https://images.unsplash.com/photo-1583316174775-bd6dc0e9f298?ixlib=rb-4.0.3&auto=format&fit=crop&w=200&q=80" 
                                 alt="Jersey" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-1 min-w-0">
                            <a th:href="@{/product/{id}(id=${review.jersey.id})}" class="font-semibold text-gray-800 hover:text-primary transition-colors line-clamp-2" th:text="${review.jersey.name}">Jersey Name</a>
                            <p class="text-sm text-gray-500 mt-1" th:text="${review.jersey.team != null ? review.jersey.team.name : '-'}">Team Name</p>
                            <p class="text-xs text-gray-400 mt-2" th:text="${'Order #ORD-' + #numbers.formatInteger(review.order.id, 3)}">Order #ORD-001</p>
                        </div>
                    </div>
                    
                    <!-- Review Info -->
                    <div class="sm:w-2/3 sm:border-l sm:border-gray-100 sm:pl-4">
                        <div class="flex items-center justify-between mb-2">
                            <div class="flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                </svg>
                                <span class="text-sm text-gray-500" th:text="${#temporals.format(review.reviewDate, 'dd MMM yyyy, HH:mm')}">01 Jan 2024, 12:00</span>
                            </div>
                        </div>
                        
                        <!-- Star Rating -->
                        <div class="flex items-center gap-1 mb-3">
                            <svg th:each="i : ${#numbers.sequence(1, 5)}" 
                                 class="w-5 h-5"
                                 th:classappend="${i <= review.rating} ? 'text-yellow-400' : 'text-gray-300'" 
                                 th:attr="fill=${i <= review.rating ? 'currentColor' : 'none'}"
                                 viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                            </svg>
                            <span class="ml-2 text-sm font-semibold text-gray-600" th:text="${review.rating} + '/5'">5/5</span>
                        </div>
                        
                        <!-- Comment -->
                        <div class="bg-gray-50 rounded-lg p-3">
                            <p class="text-sm text-gray-700 leading-relaxed" th:text="${review.comment}">Komentar ulasan...</p>
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
