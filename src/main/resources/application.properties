# Application Name
spring.application.name=myjersey

# H2 Database Configuration (File-based for persistence)
spring.datasource.url=jdbc:h2:file:./data/myjerseydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Create table if not exists (untuk development)
spring.jpa.defer-datasource-initialization=true

# SQL Init Mode
spring.jpa.sql-init-mode=always

# Multipart File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Thymeleaf Cache (development)
spring.thymeleaf.cache=false
